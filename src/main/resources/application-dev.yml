server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/visceral
    username: visceral
    password: visceral
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration,classpath:db/dev
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: 78bbe6f0953ad86cbe735b8caa59ef14f2a3678c9d0a7bbeef1661644573ffb49e4078eec2da0d0a77909fbb7b2c41f11b0be42893289c5adc574df8923e4faa # random min 32+ com: openssl rand -hex 64
  issuer: "visceral-massage"
  accessTtlMinutes: 15
  refreshTtlDays: 30

app:
  cookies:
    secure: false # dev = false, prod = true
    sameSite: Lax
  notifications:
    email:
      transport: smtp
      from: ${DEV_MAIL_FROM:no-reply@ataraksia.local}
  admin:
    bootstrap:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      phone: ${ADMIN_BOOTSTRAP_PHONE:}
      email: ${ADMIN_BOOTSTRAP_EMAIL:}
      password: ${ADMIN_BOOTSTRAP_PASSWORD:}
