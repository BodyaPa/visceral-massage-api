server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: ${MEDIA_MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${MEDIA_MULTIPART_MAX_REQUEST_SIZE:26MB}
  datasource:
    url: jdbc:postgresql://localhost:5432/visceral
    username: visceral
    password: visceral
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration,classpath:db/dev
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: 78bbe6f0953ad86cbe735b8caa59ef14f2a3678c9d0a7bbeef1661644573ffb49e4078eec2da0d0a77909fbb7b2c41f11b0be42893289c5adc574df8923e4faa # random min 32+ com: openssl rand -hex 64
  issuer: "visceral-massage"
  accessTtlMinutes: 15
  refreshTtlDays: 30

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:5173
  cookies:
    secure: false # dev = false, prod = true
    sameSite: Lax
  notifications:
    email:
      transport: ${NOTIFICATIONS_EMAIL_TRANSPORT:smtp}
      from: ${DEV_MAIL_FROM:no-reply@ataraksia.local}
    sms:
      transport: ${NOTIFICATIONS_SMS_TRANSPORT:disabled}
    reminders:
      enabled: ${NOTIFICATIONS_REMINDERS_ENABLED:false}
      fixed-delay-ms: ${NOTIFICATIONS_REMINDERS_FIXED_DELAY_MS:300000}
  owner:
    bootstrap:
      enabled: ${OWNER_BOOTSTRAP_ENABLED:false}
      phone: ${OWNER_BOOTSTRAP_PHONE:}
      email: ${OWNER_BOOTSTRAP_EMAIL:}
      password: ${OWNER_BOOTSTRAP_PASSWORD:}
  media:
    storage-directory: ${MEDIA_STORAGE_DIRECTORY:./var/media}
    max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:26214400}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - video/mp4
      - video/webm
