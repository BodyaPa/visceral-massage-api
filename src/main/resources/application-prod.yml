server:
  port: 8080
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}
  issuer: "visceral-massage"
  accessTtlMinutes: 15
  refreshTtlDays: 30

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  cookies:
    secure: true
    sameSite: Lax
  notifications:
    email:
      transport: disabled
  admin:
    bootstrap:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      phone: ${ADMIN_BOOTSTRAP_PHONE:}
      email: ${ADMIN_BOOTSTRAP_EMAIL:}
      password: ${ADMIN_BOOTSTRAP_PASSWORD:}
