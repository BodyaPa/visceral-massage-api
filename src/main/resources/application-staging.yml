server:
  port: 8080
  forward-headers-strategy: framework

spring:
  servlet:
    multipart:
      max-file-size: ${MEDIA_MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${MEDIA_MULTIPART_MAX_REQUEST_SIZE:26MB}
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
  mail:
    host: mailpit
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}
  issuer: "visceral-massage"
  accessTtlMinutes: 15
  refreshTtlDays: 30

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  cookies:
    secure: true
    sameSite: Lax
  notifications:
    email:
      transport: ${NOTIFICATIONS_EMAIL_TRANSPORT:smtp}
      from: ${STAGING_MAIL_FROM:no-reply@staging.ataraksia.local}
    sms:
      transport: ${NOTIFICATIONS_SMS_TRANSPORT:disabled}
    reminders:
      enabled: ${NOTIFICATIONS_REMINDERS_ENABLED:false}
      fixed-delay-ms: ${NOTIFICATIONS_REMINDERS_FIXED_DELAY_MS:300000}
  owner:
    bootstrap:
      enabled: ${OWNER_BOOTSTRAP_ENABLED:false}
      phone: ${OWNER_BOOTSTRAP_PHONE:}
      email: ${OWNER_BOOTSTRAP_EMAIL:}
      password: ${OWNER_BOOTSTRAP_PASSWORD:}
  media:
    storage-directory: ${MEDIA_STORAGE_DIRECTORY:/var/lib/ataraksia/media}
    max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:26214400}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - video/mp4
      - video/webm
