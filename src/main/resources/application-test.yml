spring:
  main:
    allow-bean-definition-overriding: true
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

jwt:
  secret: "test-secret-test-secret-test-secret-test-secret-123456"
  issuer: "visceral-test"
  accessTtlMinutes: 15
  refreshTtlDays: 30

app:
  cors:
    allowed-origins:
      - http://localhost:3000
  cookies:
    secure: false
    sameSite: Lax
  notifications:
    email:
      transport: disabled
    sms:
      transport: disabled
  media:
    storage-directory: ./build/test-media
    max-file-size-bytes: 26214400
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - video/mp4
      - video/webm
